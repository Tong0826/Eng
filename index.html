<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English World - MUJI Style</title>
    <style>
        /* 🎨 極簡無印風配色方案 */
        :root {
            --bg-color: #f4f1ea;       /* 無印米色背景 */
            --card-bg: #ffffff;        /* 純白卡片 */
            --text-main: #4a4a4a;      /* 深灰文字 */
            --btn-color: #7f756d;      /* 暖灰褐按鈕 (像木頭或麻布) */
            --btn-hover: #5d5550;      /* 深褐色 (滑鼠移上去時) */
            --accent-green: #8da399;   /* 柔和綠 (正確時顯示) */
            --accent-red: #c98a7d;     /* 柔和紅 (錯誤時顯示) */
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            letter-spacing: 0.5px; /* 增加字距更有文青感 */
        }

        #box { 
            background: var(--card-bg);
            padding: 40px; 
            border-radius: 12px; /* 無印風通常不用太圓，微圓即可 */
            display: inline-block; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); /* 非常輕微的陰影 */
            max-width: 450px;
            width: 90%;
        }

        h2 { font-weight: 500; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        input { 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 4px; /* 方正中帶點圓角 */
            border: 1px solid #dcdcdc; 
            background-color: #fafafa;
            width: 80%;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--btn-color); background-color: #fff; }

        /* 按鈕美化與動畫 */
        button { 
            padding: 12px 30px; 
            background-color: var(--btn-color); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 15px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover { 
            background-color: var(--btn-hover); 
            letter-spacing: 1px; /* 移上去字距變寬的小動畫 */
        }

        button:active { transform: scale(0.98); } /* 按下去微微縮小 */

        #feedback { margin-top: 20px; font-weight: 500; }
        .correct-text { color: var(--accent-green); }
        .wrong-text { color: var(--accent-red); }
        .wrong-list-item { color: var(--accent-red); text-align: left; font-size: 14px; margin: 8px 0; }
    </style>
</head>
<body>

    <div id="box">
        <h2 id="msg">Vocabulary Practice</h2>
        
        <div id="setup">
            <p>Welcome back.</p>
            <input type="text" id="userName" placeholder="Your name">
            <br>
            <button onclick="startApp()">Enter</button>
        </div>
        
        <div id="quiz-area" style="display:none;">
            <p id="question" style="font-size: 18px; color: #666;"></p>
            <input type="text" id="userAns" placeholder="English..." onkeypress="handleKeyPress(event)">
            <br>
            <button onclick="checkAnswer()">Submit</button>
            <p id="feedback"></p>
        </div>

        <div id="final-result"></div>
    </div>

    <script>
        // 你的 20 個單字庫
        const english_list = ["combine", "commercial", "complex", "concern", "conclude", "contact", "contain", "contract", "cure", "court", "current", "debate", "debt", "depth", "detail", "director", "disease", "divide", "division", "domestic"];
        const chinese_list = ["合併", "廣告;商業的", "複雜的", "涉及", "做出結論", "連絡", "包含", "契約", "治療", "法院", "目前的", "辯論", "債務", "深度", "細節", "指導者", "疾病", "分開", "分割", "內部的"];
        
        let quiz_data = [];
        let score = 0;
        let currentIdx = 0;
        let numToTest = 0;
        let wrong_list = [];

        function startApp() {
            let name = document.getElementById("userName").value || "Learner";
            document.getElementById("msg").innerText = `Hello, ${name}.`;
            document.getElementById("setup").innerHTML = `
                <p style="color:#888">How many words today?</p>
                <input type="number" id="testNum" value="5" min="1" max="${english_list.length}">
                <br>
                <button onclick="initQuiz()">Start</button>
            `;
        }

        function initQuiz() {
            numToTest = parseInt(document.getElementById("testNum").value);
            quiz_data = english_list.map((en, i) => ({ en, ch: chinese_list[i] }));
            quiz_data.sort(() => Math.random() - 0.5);

            document.getElementById("setup").style.display = "none";
            document.getElementById("quiz-area").style.display = "block";
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx < numToTest) {
                document.getElementById("question").innerText = `Question: ${quiz_data[currentIdx].ch}`;
                document.getElementById("userAns").value = "";
                document.getElementById("userAns").focus();
                document.getElementById("feedback").innerText = "";
            } else {
                finishQuiz();
            }
        }

        function checkAnswer() {
            let userAns = document.getElementById("userAns").value.toLowerCase().trim();
            let correctAns = quiz_data[currentIdx].en;
            let feedback = document.getElementById("feedback");

            if (userAns === correctAns) {
                feedback.className = "correct-text";
                feedback.innerText = "✓ Correct";
                score += 5;
            } else {
                feedback.className = "wrong-text";
                feedback.innerText = `✗ Answer: ${correctAns}`;
                wrong_list.push({ch: quiz_data[currentIdx].ch, en: correctAns});
            }

            currentIdx++;
            setTimeout(showQuestion, 1200);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') checkAnswer();
        }

        function finishQuiz() {
            document.getElementById("quiz-area").style.display = "none";
            let resultHTML = `<h3 style="color:#555">Result: ${score} points</h3>`;
            if (wrong_list.length > 0) {
                resultHTML += `<p style="text-align:left; color:#999; font-size:14px;">Review list:</p><ul style="list-style:none; padding:0;">`;
                wrong_list.forEach(item => {
                    resultHTML += `<li class="wrong-list-item">― ${item.ch} : ${item.en}</li>`;
                });
                resultHTML += `</ul>`;
            } else {
                resultHTML += `<p class="correct-text">Well done. Everything is perfect.</p>`;
            }
            resultHTML += `<br><button onclick="location.reload()">Retry</button>`;
            document.getElementById("final-result").innerHTML = resultHTML;
        }
    </script>
</body>
</html>
