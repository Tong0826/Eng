<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English World - MUJI Style</title>
    <style>
        /* 🎨 極簡無印風配色方案 */
        :root {
            --bg-color: #f4f1ea;       /* 無印米色背景 */
            --card-bg: #ffffff;        /* 純白卡片 */
            --text-main: #4a4a4a;      /* 深灰文字 */
            --btn-color: #7f756d;      /* 暖灰褐按鈕 */
            --btn-hover: #5d5550;      /* 深褐色 */
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        #box { 
            background: var(--card-bg);
            padding: 40px; 
            border-radius: 12px; 
            display: inline-block; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            max-width: 450px;
            width: 90%;
        }

        h2 { font-weight: 500; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        input { 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 4px; 
            border: 1px solid #dcdcdc; 
            background-color: #fafafa;
            width: 80%;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--btn-color); background-color: #fff; }

        button { 
            padding: 12px 30px; 
            background-color: var(--btn-color); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 15px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover { 
            background-color: var(--btn-hover); 
            transform: translateY(-2px);
        }

        button:active { transform: scale(0.98); }

        #feedback { margin-top: 20px; font-weight: bold; font-size: 18px; }
        .wrong-list-item { text-align: left; font-size: 15px; margin: 8px 0; }
    </style>
</head>
<body>

    <div id="box">
        <h2 id="msg">Hello wellcome to my English world!!</h2>
        
        <div id="setup">
            <input type="text" id="userName" placeholder="what's your name:">
            <br>
            <button onclick="startApp()">Enter</button>
        </div>
        
        <div id="quiz-area" style="display:none;">
            <p id="question" style="font-size: 18px; color: #666;"></p>
            <input type="text" id="userAns" placeholder="請輸入對應的英文單字：" onkeypress="handleKeyPress(event)">
            <br>
            <button onclick="checkAnswer()">送出答案</button>
            <p id="feedback"></p>
        </div>

        <div id="final-result"></div>
    </div>

    <script>
        const english_list = ["combine", "commercial", "complex", "concern", "conclude", "contact", "contain", "contract", "cure", "court", "current", "debate", "debt", "depth", "detail", "director", "disease", "divide", "division", "domestic"];
        const chinese_list = ["合併", "廣告;商業的", "複雜的", "涉及", "做出結論", "連絡", "包含", "契約", "治療", "法院", "目前的", "辯論", "債務", "深度", "細節", "指導者", "疾病", "分開", "分割", "內部的"];
        
        let quiz_data = [];
        let score = 0;
        let currentIdx = 0;
        let numToTest = 0;
        let wrong_list = [];

        function startApp() {
            let name = document.getElementById("userName").value || "Friend";
            document.getElementById("msg").innerText = `Hi!! ${name} Let's practice English together^o^`;
            document.getElementById("setup").innerHTML = `
                <p>Are U ready??Let's start...</p>
                <p>今天要考幾個單字？</p>
                <input type="number" id="testNum" value="5" min="1" max="${english_list.length}">
                <br>
                <button onclick="initQuiz()">開始考試</button>
            `;
        }

        function initQuiz() {
            numToTest = parseInt(document.getElementById("testNum").value);
            quiz_data = english_list.map((en, i) => ({ en, ch: chinese_list[i] }));
            quiz_data.sort(() => Math.random() - 0.5);

            document.getElementById("setup").style.display = "none";
            document.getElementById("quiz-area").style.display = "block";
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx < numToTest) {
                document.getElementById("question").innerText = `題目顯示：${quiz_data[currentIdx].ch}`;
                document.getElementById("userAns").value = "";
                document.getElementById("userAns").focus();
                document.getElementById("feedback").innerText = "";
            } else {
                finishQuiz();
            }
        }

        function checkAnswer() {
            let userAns = document.getElementById("userAns").value.toLowerCase().trim();
            let correctAns = quiz_data[currentIdx].en;
            let feedback = document.getElementById("feedback");

            if (userAns === correctAns) {
                // 保留你的原本文字與表情！
                feedback.innerText = "\nCorrect! Good job↖(^ω^)↗";
                feedback.style.color = "#8da399"; 
                score += 5;
            } else {
                // 保留你的原本文字！
                feedback.innerText = "\nwrong...Answer is: " + correctAns;
                feedback.style.color = "#c98a7d";
                wrong_list.push({ch: quiz_data[currentIdx].ch, en: correctAns});
            }

            currentIdx++;
            setTimeout(showQuestion, 1200);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') checkAnswer();
        }

        function finishQuiz() {
            document.getElementById("quiz-area").style.display = "none";
            let resultHTML = `<hr><p>Test over! U get ${score} point</p>`;
            
            if (wrong_list.length > 0) {
                resultHTML += `<p>Today's wrong list: </p><ul style="list-style:none; padding:0;">`;
                wrong_list.forEach(item => {
                    resultHTML += `<li class="wrong-list-item">― ${item.ch} : ${item.en}</li>`;
                });
                resultHTML += `</ul>`;
            } else {
                resultHTML += `<p>Perfect you are all corrcet!!</p>`;
            }
            resultHTML += `<br><button onclick="location.reload()">再測驗一次</button>`;
            document.getElementById("final-result").innerHTML = resultHTML;
        }
    </script>
</body>
</html>
